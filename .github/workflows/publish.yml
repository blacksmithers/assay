name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:  # allow a manual release from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC) — configure the publisher on PyPI for
    # blacksmithers/assay (project: assay-forge, workflow: publish.yml,
    # environment: pypi). No API token is stored in the repo.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
